     <script>

var number = prompt("Enter a number:");
var isPrime = true;

if (number <= 1) {
    isPrime = false;
} else {

    for (var i = 2; i < number; i++) {

        if (number % i == 0) {
            isPrime = false;
            break;
        }

    }

}

if (isPrime) {
    document.write(number + " is a Prime Number");
} else {
    document.write(number + " is Not a Prime Number");
}

</script>
