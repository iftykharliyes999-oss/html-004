    <script> 
        //forloop (initialization,condition,incerement/decrement/update)
        //prime number 5=2,3,4.
        function isPrime(num) {
  if (num <= 1) return false;

  for (let i = 2; i <= Math.sqrt(num); i++) {
    if (num % i === 0) {
      return false;
    }
  }

  return true;
}

console.log(isPrime(29)); // true


    </script>
