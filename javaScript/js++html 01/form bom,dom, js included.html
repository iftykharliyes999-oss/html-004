<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body> 
 <form action="#" name="f"> 
    
    NAME: <br>
    <input type="text" name="n"> <br> 
    ADDRESS: <br> 
    <textarea name="add" id="#" cols="30"></textarea> <br>
    <input type="submit" value="submit" onclick="info()">
    <input type="reset">
     
    </form>
   
    <script> 
        function info(){ 
            nam = document.f.n.value;
            address = document.f.add.value;
            store = window.open("","","width=400px,height=410px");
            store.document.write("student name:" + nam + "<br/>") ;
            store.document.write("student Address:" + address);          

        }
    </script>
    
</body>
